# ============================================================
# GoAccess 站点配置模板 - 完整版
# 使用说明：
# 1. 复制此文件并重命名为您的站点名称（例如：我的博客.conf）
# 2. 根据需要取消注释并修改配置项
# 3. 使用 部署配置.sh 脚本将配置部署到运行目录
# ============================================================

# ============================================================
# 基础配置（必须配置）
# ============================================================

# 站点显示名称（可选，用于标识）
site_name="您的站点名称"

# Nginx 访问日志文件的完整路径（必须配置）
# 宝塔面板默认路径格式：/www/wwwlogs/您的域名.log
log_file="/www/wwwlogs/您的域名.log"

# HTML 分析报告的输出路径（必须配置）
output_html="/www/wwwroot/您的域名/site-log.html"

# ============================================================
# 日志格式配置
# ============================================================

# 日志格式（必须配置）
# 常用格式：
#   COMBINED  - Nginx/Apache 组合格式（推荐，包含 User-Agent 和 Referer）
#   COMMON    - 通用日志格式（基础信息）
#   VCOMBINED - 带虚拟主机的组合格式
#   VCOMMON   - 带虚拟主机的通用格式
#   W3C       - IIS W3C 格式
#   SQUID     - Squid 原生格式
#   CLOUDFRONT - AWS CloudFront 格式
log_format=COMBINED

# ------------------------------------------------------------
# 自定义日志格式（需要时使用）
# 如果您的 Nginx 使用自定义日志格式，可以在这里定义
# 详细说明请参考：https://goaccess.io/man#custom-log
# ------------------------------------------------------------

# 时间格式（可选）
# 示例：%H:%M:%S （24小时制）
# time_format=%H:%M:%S

# 日期格式（可选）
# 示例：%d/%b/%Y （日/月/年，如 20/May/2026）
# date_format=%d/%b/%Y

# 自定义日志格式字符串（高级用法）
# 示例：
# log_format=%h %^[%d:%t %^] "%r" %s %b "%R" "%u"

# ============================================================
# 显示面板配置
# ============================================================

# 启用的面板模块（默认启用所有）
# 可以指定只显示某些面板
# 可用面板：
#   1=一般统计, 2=独立访客, 3=请求的文件, 4=请求的URL
#   5=404或未找到, 6=访客的主机名和IP, 7=操作系统
#   8=浏览器, 9=访问时间, 10=虚拟主机, 11=来源站点
#   12=来源URL, 13=404 URL, 14=地理位置
#   15=HTTP 状态代码, 16=远程用户, 17=请求时间
#   18=虚拟主机, 19=引用站点, 20=引用URL
#   21=关键字, 22=404错误, 23=地理位置
#
# 示例：只启用访问量、访客、页面、来源
# enable_panel=1,2,3,11

# 禁用特定面板（如果不需要某些面板）
# 示例：禁用地理位置和关键字
# disable_panel=14,21

# ============================================================
# 过滤配置
# ============================================================

# 排除的文件扩展名（不统计这些文件的访问）
# 用逗号分隔，注意不要有空格
# 示例：.jpg,.png,.gif,.css,.js,.ico,.svg,.woff,.woff2,.map
# exclude_extension=.jpg,.png,.gif,.css,.js,.ico,.svg,.woff,.woff2

# 包含的文件扩展名（只统计这些文件）
# 与 exclude_extension 互斥，不要同时使用
# include_extension=.html,.php,.htm

# 忽略爬虫/蜘蛛访问（需要时启用）
# ignore_crawlers=true

# 忽略指定的 IP 地址或网段
# 可以多次使用此配置
# ignore_ip=127.0.0.1
# ignore_ip=192.168.1.0/24

# 忽略指定的内部主机名
# ignore_host=localhost
# ignore_host=internal.example.com

# 忽略指定的引用来源
# ignore_referer=example.com

# 只处理指定日期之后的记录
# 格式：dd/MMM/yyyy （例如：01/Jan/2026）
# after=01/Jan/2026

# 只处理指定日期之前的记录
# before=31/Dec/2026

# ============================================================
# 数据持久化配置
# ============================================================

# 保留数据库（默认启用，不清除历史数据）
# 如果设置为 false，每次分析会清空数据库
# keep_db=true

# 保留最近 N 天的数据（自动清理 N 天前的数据）
# 示例：保留最近 30 天
# keep_last=30

# ============================================================
# 输出配置
# ============================================================

# HTML 报告的标题（多站点使用，便于区分）
# 使用站点名称作为标题
html_report_title="${site_name:-网站访问分析}"

# 实时 HTML 报告（WebSocket 支持）
# real_time_html=true

# WebSocket 服务端口（实时报告使用）
# ws_url=ws://localhost:7890

# 输出 JSON 格式（如需同时生成）
# output=json:/www/wwwroot/您的域名/report.json

# 输出 CSV 格式（如需同时生成）
# output=csv:/www/wwwroot/您的域名/report.csv

# ============================================================
# 中文本地化配置（需要 GoAccess 编译时启用 gettext 支持）
# ============================================================

# 设置 HTML 报告的语言为中文
# 注意：需要 GoAccess 编译时启用 --enable-gettext 才能使用
# 
# 如果遇到 "unrecognized option '--lang=zh'" 错误，说明：
# 1. GoAccess 编译时未正确启用 gettext 支持
# 2. 解决方法：
#    - 确保系统安装了完整的 gettext 开发包：
#      * CentOS/RHEL: yum install gettext gettext-devel gettext-libs
#      * Debian/Ubuntu: apt-get install gettext autopoint gettext-base
#    - 重新运行安装脚本：sudo ./安装GoAccess.sh --force
#    - 安装过程中注意查看 "gettext 支持" 的验证结果
#
# 3. 验证 gettext 是否启用：
#    goaccess --help | grep -i lang
#    如果有输出，说明支持 --lang 选项
#
# 3. 如果仍然无法启用，可以注释掉下面这行，使用英文界面
# lang=zh

# 设置 HTML 报告的字符编码为 UTF-8
# 确保中文字符正确显示
html_charset=utf-8

# 设置日期时间格式为中文习惯
# 格式：YYYY年MM月DD日 HH:MM
html_date_format="%Y年%m月%d日 %H:%M"

# 设置数字格式为中文习惯（使用逗号分隔千位）
# 例如：1,234,567
html_num_format=","

# ============================================================
# 地理位置配置
# ============================================================

# GeoIP 数据库文件路径（使用脚本目录下的 GeoIP 目录）
# 启用此配置可获得更精确的地理位置信息
geoip_database=/www/wwwroot/GoAccess-管理/GeoIP/GeoLite2-City.mmdb

# ============================================================
# 性能配置
# ============================================================

# 最大显示条目数（每个面板显示的记录数）
# 默认：20
# max_items=50

# 内存中的缓存大小（行数）
# 增加此值可提高性能，但占用更多内存
# num_tests=365

# 解析时跳过验证（提高性能，不推荐）
# no_validation=false

# ============================================================
# 其他配置
# ============================================================

# 匿名化 IP 地址（保护用户隐私，推荐启用）
# 将 IP 最后一段设为 0，例如 192.168.1.0
# anonymize_ip=true

# 双解码（用于双重编码的 URL）
# double_decode=true

# 彩色输出（终端模式）
# color=true

# 不显示进度条（适合定时任务）
# no_progress=true

# 显示每个面板的详细数据（终端模式）
# with_output_resolver=true

# ============================================================
# 配置完成！
# 使用 分析所有站点.sh 直接分析日志
# ============================================================