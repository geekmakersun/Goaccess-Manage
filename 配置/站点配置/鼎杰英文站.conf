# ============================================================
# GoAccess 站点配置模板
# 使用说明：
# 1. 复制此文件并重命名为鼎杰英文站（例如：我的博客.conf）
# 2. 根据需要取消注释并修改配置项
# 3. 使用 部署配置.sh 脚本将配置部署到运行目录
# ============================================================

# ============================================================
# 基础配置（必须配置）
# ============================================================

# 站点显示名称（可选，用于标识）
site_name="鼎杰英文站 网站访问分析"

# Nginx 访问日志文件的完整路径
# 宝塔面板默认路径格式：/www/wwwlogs/www.dingjiealu.com.log
log_file="/www/wwwlogs/www.dingjiealu.com.log"

# HTML 分析报告的输出路径
output_html="/www/wwwroot/www.dingjiealu.com/log/index.html"

# ============================================================
# 日志格式配置
# ============================================================

# 日志格式（必须配置）
# 常用格式：COMBINED（推荐）、COMMON、VCOMBINED、VCOMMON、W3C、SQUID、CLOUDFRONT
log_format=COMBINED

# 自定义日志格式（高级用法，参考：https://goaccess.io/man#custom-log）
# time_format=%H:%M:%S
# date_format=%d/%b/%Y
# log_format=%h %^[%d:%t %^] "%r" %s %b "%R" "%u"

# ============================================================
# 显示面板配置
# ============================================================

# 启用的面板模块（默认启用所有）
# 可用面板：1=一般统计, 2=独立访客, 3=请求的文件, 4=请求的URL
#          5=404或未找到, 6=访客主机名和IP, 7=操作系统, 8=浏览器
#          9=访问时间, 14=地理位置, 15=HTTP状态代码
# enable_panel=1,2,3,11

# 禁用特定面板
# disable_panel=14,21

# ============================================================
# 过滤配置
# ============================================================

# 排除的文件扩展名（用逗号分隔，不要有空格）
# exclude_extension=.jpg,.png,.gif,.css,.js,.ico,.svg,.woff,.woff2

# 忽略爬虫/蜘蛛访问
# ignore_crawlers=true

# 忽略指定的 IP 地址或网段
# ignore_ip=127.0.0.1
# ignore_ip=192.168.1.0/24

# 忽略指定的引用来源
# ignore_referer=example.com

# 只处理指定日期范围的记录（格式：dd/MMM/yyyy）
# after=01/Jan/2026
# before=31/Dec/2026

# ============================================================
# 数据持久化配置
# ============================================================

# 保留数据库（默认启用，不清除历史数据）
# keep_db=true

# 保留最近 N 天的数据（自动清理旧数据）
# keep_last=30

# ============================================================
# 输出配置
# ============================================================

# HTML 报告的标题
html_report_title="鼎杰英文站 网站访问分析"

# 实时 HTML 报告（WebSocket 支持）
# real_time_html=true
# ws_url=ws://localhost:7890

# 输出 JSON/CSV 格式
# output /www/wwwroot/www.dingjiealu.com/log/report.json
# output /www/wwwroot/www.dingjiealu.com/report.csv

# ============================================================
# 中文本地化配置
# ============================================================

# 设置 HTML 报告的语言为中文
# 注意：需要 GoAccess 编译时启用 --enable-gettext 支持
# 验证方法：goaccess --help | grep -i lang
# lang=zh

# 设置 HTML 报告的字符编码为 UTF-8
html_charset=utf-8

# ============================================================
# 地理位置配置
# ============================================================

# GeoIP 数据库文件路径
# 注意：需要根据实际安装路径修改
geoip_database=/www/wwwroot/GoAccess-Manage/数据/GeoIP/GeoLite2-City.mmdb

# ============================================================
# 性能配置
# ============================================================

# 最大显示条目数（每个面板显示的记录数，默认：20）
# max_items=50

# 内存中的缓存大小（行数）
# num_tests=365

# ============================================================
# 其他配置
# ============================================================

# 匿名化 IP 地址（保护用户隐私）
# anonymize_ip=true

# 双解码（用于双重编码的 URL）
# double_decode=true

# 彩色输出（终端模式）
# color=true

# 不显示进度条（适合定时任务）
# no_progress=true

# ============================================================
# 配置完成！使用 分析所有站点.sh 直接分析日志
# ============================================================
